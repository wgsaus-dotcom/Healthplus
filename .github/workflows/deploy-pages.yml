name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List Cloudflare Pages Projects
        env:
          CF_PAGES_TOKEN: ${{ secrets.CF_PAGES_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          echo "=== Listing Pages Projects ==="
          curl -s "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects" \
            -H "Authorization: Bearer $CF_PAGES_TOKEN" | python3 -c "
import sys,json
d=json.load(sys.stdin)
print('Success:', d.get('success'))
for p in d.get('result', []):
    print(f'Project: {p[\"name\"]} | URL: {p.get(\"subdomain\",\"?\")}.pages.dev | Canonical: {p.get(\"canonical_deployment\",{}).get(\"url\",\"?\")}')
"

      - name: Deploy to Correct Project
        env:
          CF_PAGES_TOKEN: ${{ secrets.CF_PAGES_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npm install -g wrangler
          # Try both possible names
          wrangler pages deploy . --project-name=healthplus-3gy --branch=main --commit-dirty=true 2>&1 || \
          wrangler pages deploy . --project-name=healthplus --branch=main --commit-dirty=true 2>&1 || \
          echo "Both project names failed"

      - name: Purge Cache
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_PAGES_TOKEN: ${{ secrets.CF_PAGES_TOKEN }}
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_PAGES_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
