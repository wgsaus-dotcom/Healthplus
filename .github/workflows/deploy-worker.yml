name: Deploy HPI Onboarding Worker

on:
  push:
    paths:
      - 'hpi-worker/worker.js'
      - 'hpi-worker/wrangler.toml'
    branches:
      - main
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy Worker
        working-directory: hpi-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_WORKER_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: wrangler deploy

      - name: Confirm deployment
        run: |
          echo "✅ hpi-onboarding worker deployed successfully"
          echo "🔗 https://hpi-onboarding.wgs-aus.workers.dev/api/ping"
