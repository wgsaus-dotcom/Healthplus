<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Staff Portal — HealthPlus International</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#07101C; --bg2:#0B1829; --bg3:#0E1F36; --bg4:#050C15;
  --teal:#0ECECE; --teal-d:#0B6B6E; --amber:#F5A623;
  --ink:#FFFFFF; --muted:rgba(255,255,255,.65); --dim:rgba(255,255,255,.4);
  --border:rgba(14,206,206,.15); --card:#0E1F36;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}

/* NAV */
nav{background:rgba(255,255,255,.98);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:72px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.nav-logo{display:flex;flex-direction:column;align-items:flex-start;gap:2px}
.nav-logo img{height:44px;width:auto}
.nav-tagline{font-size:8px;letter-spacing:.22em;color:#0B6B6E;text-transform:uppercase;font-family:'Barlow',sans-serif;font-weight:600}
.nav-right{display:flex;align-items:center;gap:16px}
.nav-user{font-size:13px;color:rgba(13,31,51,.6);font-weight:500}
.btn-logout{background:transparent;border:1.5px solid var(--teal-d);color:var(--teal-d);padding:7px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif;transition:all .2s}
.btn-logout:hover{background:var(--teal-d);color:#fff}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 72px);padding:40px 16px}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:48px 40px;width:100%;max-width:420px}
.login-card h1{font-family:'Big Shoulders Display',sans-serif;font-size:28px;font-weight:900;color:var(--teal);letter-spacing:1px;margin-bottom:6px}
.login-card p{color:var(--muted);font-size:14px;margin-bottom:32px}
.field{margin-bottom:18px}
.field label{display:block;font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--teal);margin-bottom:6px}
.field input{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--ink);font-family:'Barlow',sans-serif;font-size:14px;outline:none;transition:border .2s}
.field input:focus{border-color:var(--teal)}
.btn-primary{width:100%;background:var(--teal);color:#000;border:none;padding:13px;border-radius:8px;font-family:'Big Shoulders Display',sans-serif;font-size:16px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:background .2s}
.btn-primary:hover{background:#0bb8b8}
.login-err{color:#ff6b6b;font-size:13px;margin-top:12px;display:none}

/* PORTAL */
#portal-screen{display:none;padding:32px}
.portal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.portal-title{font-family:'Big Shoulders Display',sans-serif;font-size:32px;font-weight:900;letter-spacing:1px}
.portal-title span{color:var(--teal)}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:28px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px;text-align:center}
.stat-num{font-family:'Big Shoulders Display',sans-serif;font-size:36px;font-weight:900;color:var(--teal);line-height:1}
.stat-label{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:4px}

/* FILTERS */
.filters{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.filter-btn{background:var(--bg3);border:1.5px solid var(--border);color:var(--muted);padding:7px 16px;border-radius:20px;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;font-family:'Barlow',sans-serif;transition:all .2s}
.filter-btn:hover,.filter-btn.active{background:var(--teal);border-color:var(--teal);color:#000}
.filter-btn.amber.active{background:var(--amber);border-color:var(--amber);color:#000}

/* TABLE */
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead{background:var(--bg3)}
thead th{padding:14px 16px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--teal)}
tbody tr{border-top:1px solid var(--border);transition:background .15s;cursor:pointer}
tbody tr:hover{background:rgba(14,206,206,.04)}
td{padding:14px 16px;font-size:13px;color:var(--muted);vertical-align:middle}
td.name{color:var(--ink);font-weight:500}
td.date{color:var(--dim);font-size:12px}

/* BADGES */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.badge-new{background:rgba(14,206,206,.15);color:var(--teal);border:1px solid rgba(14,206,206,.3)}
.badge-reviewing{background:rgba(245,166,35,.15);color:var(--amber);border:1px solid rgba(245,166,35,.3)}
.badge-shortlisted{background:rgba(102,187,106,.15);color:#66BB6A;border:1px solid rgba(102,187,106,.3)}
.badge-placed{background:rgba(102,187,106,.25);color:#66BB6A;border:1px solid rgba(102,187,106,.5)}
.badge-declined{background:rgba(255,107,107,.12);color:#ff6b6b;border:1px solid rgba(255,107,107,.25)}
.badge-worker{background:rgba(14,206,206,.1);color:var(--teal);border:1px solid var(--border)}
.badge-facility{background:rgba(245,166,35,.1);color:var(--amber);border:1px solid rgba(245,166,35,.2)}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--dim)}
.empty-icon{font-size:40px;margin-bottom:12px}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto}
.modal-header{padding:24px 28px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h2{font-family:'Big Shoulders Display',sans-serif;font-size:22px;font-weight:900;letter-spacing:1px}
.modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:4px 8px;border-radius:4px}
.modal-close:hover{color:var(--ink)}
.modal-body{padding:24px 28px}
.detail-row{display:flex;gap:12px;margin-bottom:14px;align-items:flex-start}
.detail-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--teal);min-width:120px;padding-top:2px}
.detail-value{font-size:14px;color:var(--ink);flex:1}
.detail-value a{color:var(--teal);text-decoration:none}
.modal-actions{padding:0 28px 24px;display:flex;gap:10px;flex-wrap:wrap}
.status-select{background:var(--bg3);border:1.5px solid var(--border);color:var(--ink);padding:9px 14px;border-radius:8px;font-family:'Barlow',sans-serif;font-size:13px;cursor:pointer;flex:1}
.notes-area{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--ink);font-family:'Barlow',sans-serif;font-size:13px;resize:vertical;min-height:80px;outline:none;transition:border .2s;margin-bottom:10px}
.notes-area:focus{border-color:var(--teal)}
.btn-save{background:var(--teal);color:#000;border:none;padding:10px 24px;border-radius:8px;font-family:'Big Shoulders Display',sans-serif;font-size:15px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:background .2s}
.btn-save:hover{background:#0bb8b8}
.save-ok{color:#66BB6A;font-size:13px;display:none;margin-left:8px}

.loading{text-align:center;padding:40px;color:var(--muted)}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* Pagination */
.pagination{display:flex;justify-content:center;gap:8px;padding:20px;align-items:center}
.page-btn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:6px;font-size:13px;cursor:pointer;font-family:'Barlow',sans-serif;transition:all .2s}
.page-btn:hover,.page-btn.active{background:var(--teal);border-color:var(--teal);color:#000}
.page-info{color:var(--dim);font-size:13px}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <img src="images/logo-healthplus-transparent.png" alt="HealthPlus International">
    <span class="nav-tagline">People · Care · Compliance</span>
  </a>
  <div class="nav-right">
    <span class="nav-user" id="nav-user"></span>
    <button class="btn-logout" id="btn-logout" onclick="logout()" style="display:none">Sign Out</button>
  </div>
</nav>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <h1>STAFF PORTAL</h1>
    <p>HealthPlus International · Applications Dashboard</p>
    <div class="field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-primary" onclick="doLogin()">SIGN IN</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- PORTAL -->
<div id="portal-screen">
  <div class="portal-header">
    <div>
      <div style="font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--teal);margin-bottom:4px">HealthPlus International</div>
      <h1 class="portal-title">APPLICATIONS <span>PORTAL</span></h1>
    </div>
  </div>

  <div class="stats-row" id="stats-row">
    <div class="stat-card"><div class="stat-num" id="stat-total">—</div><div class="stat-label">Total</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-new" style="color:var(--teal)">—</div><div class="stat-label">New</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-reviewing" style="color:var(--amber)">—</div><div class="stat-label">Reviewing</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-shortlisted" style="color:#66BB6A">—</div><div class="stat-label">Shortlisted</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-placed" style="color:#66BB6A">—</div><div class="stat-label">Placed</div></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('status','')">All</button>
    <button class="filter-btn" onclick="setFilter('status','new')">New</button>
    <button class="filter-btn" onclick="setFilter('status','reviewing')">Reviewing</button>
    <button class="filter-btn" onclick="setFilter('status','shortlisted')">Shortlisted</button>
    <button class="filter-btn" onclick="setFilter('status','placed')">Placed</button>
    <button class="filter-btn" onclick="setFilter('status','declined')">Declined</button>
    <div style="width:1px;background:var(--border);height:24px;margin:0 4px"></div>
    <button class="filter-btn amber" onclick="setFilter('type','worker')">Workers</button>
    <button class="filter-btn amber" onclick="setFilter('type','facility')">Facilities</button>
    <button class="filter-btn" onclick="setFilter('type','')">Both</button>
  </div>

  <div class="table-wrap">
    <div id="table-content" class="loading"><span class="spinner"></span>Loading applications…</div>
  </div>

  <div class="pagination" id="pagination"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">APPLICATION</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-actions">
      <div style="width:100%;margin-bottom:6px">
        <textarea class="notes-area" id="modal-notes" placeholder="Internal notes…"></textarea>
      </div>
      <select class="status-select" id="modal-status">
        <option value="new">New</option>
        <option value="reviewing">Reviewing</option>
        <option value="shortlisted">Shortlisted</option>
        <option value="placed">Placed</option>
        <option value="declined">Declined</option>
      </select>
      <button class="btn-save" onclick="saveApplication()">SAVE</button>
      <span class="save-ok" id="save-ok">✓ Saved</span>
    </div>
  </div>
</div>

<script>
const API = 'https://hpi-onboarding.wgs-aus.workers.dev';
let token = localStorage.getItem('hpi_token') || '';
let currentApp = null;
let filters = { status: '', type: '' };
let currentPage = 1;

// ── Auth ─────────────────────────────────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-err');
  errEl.style.display = 'none';

  if (!email || !pass) { showErr('Enter email and password'); return; }

  try {
    const res = await fetch(`${API}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass })
    });
    const data = await res.json();
    if (!data.ok) { showErr(data.error || 'Invalid credentials'); return; }

    token = data.token;
    localStorage.setItem('hpi_token', token);
    localStorage.setItem('hpi_name', data.name);
    showPortal(data.name);
  } catch (e) {
    showErr('Connection error. Try again.');
  }
}

function showErr(msg) {
  const el = document.getElementById('login-err');
  el.textContent = msg;
  el.style.display = 'block';
}

function showPortal(name) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('portal-screen').style.display = 'block';
  document.getElementById('nav-user').textContent = name || '';
  document.getElementById('btn-logout').style.display = 'block';
  loadApplications();
  loadStats();
}

async function logout() {
  await fetch(`${API}/api/auth/logout`, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${token}` }
  });
  token = '';
  localStorage.removeItem('hpi_token');
  localStorage.removeItem('hpi_name');
  location.reload();
}

// ── Load ─────────────────────────────────────────────────────────────────────
async function loadApplications(page = 1) {
  currentPage = page;
  const el = document.getElementById('table-content');
  el.innerHTML = '<div class="loading"><span class="spinner"></span>Loading…</div>';

  const params = new URLSearchParams({ page });
  if (filters.status) params.set('status', filters.status);
  if (filters.type)   params.set('type', filters.type);

  try {
    const res = await fetch(`${API}/api/portal/applications?${params}`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (res.status === 401) { logout(); return; }
    const data = await res.json();
    renderTable(data.applications || [], data.total || 0, page);
    renderPagination(data.total || 0, page);
  } catch (e) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div>Failed to load. Check connection.</div>';
  }
}

async function loadStats() {
  // Load counts per status
  const statuses = ['new','reviewing','shortlisted','placed'];
  const all = await fetch(`${API}/api/portal/applications?page=1`, { headers: { 'Authorization': `Bearer ${token}` } });
  const allData = await all.json();
  document.getElementById('stat-total').textContent = allData.total || 0;

  for (const s of statuses) {
    const r = await fetch(`${API}/api/portal/applications?status=${s}`, { headers: { 'Authorization': `Bearer ${token}` } });
    const d = await r.json();
    document.getElementById(`stat-${s}`).textContent = d.total || 0;
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderTable(apps, total, page) {
  const el = document.getElementById('table-content');
  if (!apps.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📋</div>No applications found.</div>';
    return;
  }

  el.innerHTML = `
  <table>
    <thead>
      <tr>
        <th>#</th><th>Type</th><th>Name</th><th>Role / Facility</th><th>Location</th><th>Date</th><th>Status</th>
      </tr>
    </thead>
    <tbody>
      ${apps.map(a => `
        <tr onclick="openModal(${JSON.stringify(a).replace(/"/g,'&quot;')})">
          <td style="color:var(--dim)">${a.id}</td>
          <td><span class="badge badge-${a.type}">${a.type}</span></td>
          <td class="name">${a.first_name} ${a.last_name}</td>
          <td>${a.type === 'worker' ? (a.role || '—') : (a.facility_name || '—')}</td>
          <td>${a.lhd || a.location || '—'}</td>
          <td class="date">${formatDate(a.created_at)}</td>
          <td><span class="badge badge-${a.status}">${a.status}</span></td>
        </tr>
      `).join('')}
    </tbody>
  </table>`;
}

function renderPagination(total, page) {
  const pages = Math.ceil(total / 20);
  const el = document.getElementById('pagination');
  if (pages <= 1) { el.innerHTML = ''; return; }

  let html = `<span class="page-info">${total} total</span>`;
  for (let i = 1; i <= pages; i++) {
    html += `<button class="page-btn ${i===page?'active':''}" onclick="loadApplications(${i})">${i}</button>`;
  }
  el.innerHTML = html;
}

// ── Filters ───────────────────────────────────────────────────────────────────
function setFilter(key, val) {
  filters[key] = val;
  // Update active buttons
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.remove('active');
  });
  event.target.classList.add('active');
  loadApplications(1);
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(app) {
  currentApp = app;
  document.getElementById('modal-title').textContent =
    app.type === 'worker' ? `WORKER — ${app.first_name} ${app.last_name}` : `FACILITY — ${app.facility_name}`;
  document.getElementById('modal-status').value = app.status;
  document.getElementById('modal-notes').value = app.notes || '';
  document.getElementById('save-ok').style.display = 'none';

  const fields = app.type === 'worker' ? [
    ['Name',        `${app.first_name} ${app.last_name}`],
    ['Email',       `<a href="mailto:${app.email}">${app.email}</a>`],
    ['Phone',       `<a href="tel:${app.phone}">${app.phone}</a>`],
    ['Role',        app.role],
    ['Location',    app.location],
    ['LHD',         app.lhd],
    ['Availability',app.availability],
    ['Visa Status', app.visa_status],
    ['AHPRA No.',   app.ahpra_number],
    ['Qualification',app.qualification],
    ['Message',     app.message],
    ['Applied',     formatDate(app.created_at)],
  ] : [
    ['Contact',     `${app.first_name} ${app.last_name}`],
    ['Email',       `<a href="mailto:${app.email}">${app.email}</a>`],
    ['Phone',       `<a href="tel:${app.phone}">${app.phone}</a>`],
    ['Facility',    app.facility_name],
    ['Role Needed', app.role],
    ['LHD',         app.lhd],
    ['Workers #',   app.workers_needed],
    ['Start Date',  app.start_date],
    ['Message',     app.message],
    ['Submitted',   formatDate(app.created_at)],
  ];

  document.getElementById('modal-body').innerHTML = fields
    .filter(([,v]) => v)
    .map(([l,v]) => `<div class="detail-row"><div class="detail-label">${l}</div><div class="detail-value">${v}</div></div>`)
    .join('');

  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  currentApp = null;
}

async function saveApplication() {
  if (!currentApp) return;
  const status = document.getElementById('modal-status').value;
  const notes  = document.getElementById('modal-notes').value;

  const res = await fetch(`${API}/api/portal/applications/${currentApp.id}`, {
    method: 'PATCH',
    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ status, notes })
  });

  if (res.ok) {
    const ok = document.getElementById('save-ok');
    ok.style.display = 'inline';
    setTimeout(() => ok.style.display = 'none', 2000);
    loadApplications(currentPage);
    loadStats();
  }
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function formatDate(dt) {
  if (!dt) return '—';
  return new Date(dt).toLocaleDateString('en-AU', { day:'numeric', month:'short', year:'numeric' });
}

// ── Init ──────────────────────────────────────────────────────────────────────
if (token) {
  const name = localStorage.getItem('hpi_name') || '';
  showPortal(name);
} 
</script>
</body>
</html>
